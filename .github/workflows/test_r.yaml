name: R-test

on:
  pull_request:
    branches:
      [main]
  push:
    branches:
      [main, dev]
  schedule:
    - cron: '11 1 1 * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
jobs:
  R-test:
    name: python ${{ matrix.python-version }}, ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      REPO_NAME: ${{ github.event.repository.name }}
      
    strategy:
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
        
    steps:
      - uses: actions/checkout@v7

      - uses: conda-incubator/setup-miniconda@v4
        with:
          auto-update-conda: true
          python-version: ${{ matrix.python-version }}
          miniforge-version: 'latest'
          
      - name: Conda install
        shell: bash -el {0}
        run: |
          conda create -y -n wq_harmonize python=${{ matrix.python-version }}
          conda activate wq_harmonize
          conda install -n wq_harmonize --file requirements.txt
          conda install -n wq_harmonize pytest pip
          conda run -n wq_harmonize pip install .

      - name: Print Conda environment
        shell: bash -l {0}
        run: |
          conda activate wq_harmonize
          conda info
          conda list

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      
      #- uses: r-lib/actions/setup-renv@v2
      
      - uses: r-lib/actions/setup-pandoc@v2
      
      - name: R depends
        shell: Rscript {0}
        run: |
          install.packages(c("knitr", "rmarkdown", "reticulate"))
        
      - name: setup r-reticulate venv & render rmd
        shell: bash -l {0}
        run: |
          # Ensure conda is available in this shell and activate the env
          source "$(conda info --base)/etc/profile.d/conda.sh"
          conda activate wq_harmonize
          
          # Run R code (just uses Rscript -e to run the string
          Rscript -e "library(reticulate)"

          # Have reticulate use the conda environment we created earlier.
          Rscript -e "reticulate::use_condaenv('wq_harmonize', required = TRUE)"
                    
          # Check
          Rscript -e "reticulate::py_discover_config()"
          Rscript -e "print(reticulate::py_config())"
          
          # Alternative approach creating the env in R
          # packages = c(
          #     "pytest", "numpy<2.0", "pandas<2.0", "geopandas>=0.10.2, <0.13", "pint>=0.18",
          #     "dataretrieval>=1.0, <1.0.5", "requests"
          #     )
          # reticulate::install_miniconda()
          # reticulate::conda_create("wq_harmonize", python_version = "${{ matrix.python-version }}")
          # reticulate::conda_install("wq_harmonize", packages)
          # path_to_venv <- virtualenv_create(
          #  envname = "wq_harmonize",
          #  python = Sys.which("python"), # placed on PATH by the setup-python action
          #  packages
          # )
          # use_virtualenv("wq_harmonize")
          #reticulate::use_condaenv("wq_harmonize")
          #reticulate::py_install("git+https://github.com/USEPA/harmonize-wq.git", pip = TRUE, envname = "wq_harmonize")

          # Render the vignette
          Rscript -e "rmarkdown::render(input = 'demos/Harmonize_Pensacola.Rmd')"

      - name: Upload artifact
        if: ${{ (matrix.os == 'windows-latest') && (matrix.python-version == 3.11) }}
        uses: actions/upload-artifact@v7
        with:
          name: demos-artifact
          # Upload entire demos folder
          path: './demos'
